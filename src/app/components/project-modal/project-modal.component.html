<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <h2 class="modal-title">{{ isEditMode ? 'Edit Project' : 'Create Project' }}</h2>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="projectName">Project Name <span class="required">*</span></label>
        <input
          id="projectName"
          type="text"
          [(ngModel)]="projectName"
          name="projectName"
          maxlength="64"
          placeholder="Enter project name"
          [class.input-error]="submitted && !projectName.trim()"
        />
        @if (submitted && !projectName.trim()) {
          <span class="error-message">Project name is required.</span>
        }
      </div>

      <div class="form-group">
        <label for="projectDescription">Description</label>
        <textarea
          id="projectDescription"
          [(ngModel)]="projectDescription"
          name="projectDescription"
          maxlength="256"
          placeholder="Enter project description (optional)"
          rows="3"
        ></textarea>
      </div>

      <div class="form-group">
        <label>Color <span class="required">*</span></label>
        <div class="color-picker-grid">
          @for (color of projectColors; track color) {
            <button
              type="button"
              class="color-circle"
              [style.background-color]="color"
              [class.selected]="selectedColor === color"
              (click)="selectColor(color)"
              [attr.aria-label]="'Select color ' + color"
            >
              @if (selectedColor === color) {
                <span class="check-icon">✓</span>
              }
            </button>
          }
        </div>
        @if (submitted && !selectedColor) {
          <span class="error-message">Please select a project color.</span>
        }
      </div>

      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn btn-save">{{ isEditMode ? 'Save Changes' : 'Create Project' }}</button>
      </div>
    </form>
  </div>
</div>
