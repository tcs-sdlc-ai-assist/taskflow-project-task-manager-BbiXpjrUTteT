<div class="modal-overlay" (click)="onOverlayClick($event)">
  <div class="modal-dialog" (click)="$event.stopPropagation()">
    <h2 class="modal-title">{{ isEditMode ? 'Edit Task' : 'Create Task' }}</h2>

    <form (ngSubmit)="onSave()">
      <div class="form-group">
        <label for="taskTitle">Title <span class="required">*</span></label>
        <input
          id="taskTitle"
          type="text"
          [(ngModel)]="task.title"
          name="title"
          maxlength="128"
          placeholder="Enter task title"
          #titleInput="ngModel"
          required
        />
        @if (submitted && !task.title.trim()) {
          <span class="validation-error">Task title is required.</span>
        }
      </div>

      <div class="form-group">
        <label for="taskDescription">Description</label>
        <textarea
          id="taskDescription"
          [(ngModel)]="task.description"
          name="description"
          maxlength="512"
          placeholder="Enter task description"
          rows="4"
        ></textarea>
      </div>

      <div class="form-group">
        <label for="taskPriority">Priority <span class="required">*</span></label>
        <select
          id="taskPriority"
          [(ngModel)]="task.priority"
          name="priority"
          required
        >
          @for (p of priorities; track p) {
            <option [value]="p">{{ p | titlecase }}</option>
          }
        </select>
        @if (submitted && !task.priority) {
          <span class="validation-error">Priority is required.</span>
        }
      </div>

      @if (isEditMode) {
        <div class="form-group">
          <label for="taskStatus">Status <span class="required">*</span></label>
          <select
            id="taskStatus"
            [(ngModel)]="task.status"
            name="status"
            required
          >
            @for (s of statuses; track s) {
              <option [value]="s">{{ s === 'inprogress' ? 'In Progress' : (s | titlecase) }}</option>
            }
          </select>
          @if (submitted && !task.status) {
            <span class="validation-error">Status is required.</span>
          }
        </div>
      }

      <div class="modal-actions">
        <button type="button" class="btn btn-cancel" (click)="onCancel()">Cancel</button>
        <button type="submit" class="btn btn-save">{{ isEditMode ? 'Update' : 'Create' }}</button>
      </div>
    </form>
  </div>
</div>
